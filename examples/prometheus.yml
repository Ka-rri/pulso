# Configuración de ejemplo para integrar Prometheus con pulso
# Para usar:
#   1. Levantar pulso en el puerto 8080
#   2. Levantar Prometheus apuntando a este archivo:
#      docker run -p 9090:9090 -v $(pwd)/examples/prometheus.yml:/etc/prometheus/prometheus.yml prom/prometheus

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: pulso
    metrics_path: /metrics/prometheus
    static_configs:
      - targets:
          - localhost:8080